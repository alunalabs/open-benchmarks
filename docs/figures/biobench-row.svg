<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">BioBench row anatomy</title>
  <desc id="desc">A BioBench row edits a sender program, runs a Gaia spatial rollout, reads the receiver pathway, and checks whether the direction matches the curated expectation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27364a"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .subtitle { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536174; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2a3a; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6b7a; }
      .badge { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #27364a; }
      .box { fill: #fbfcff; stroke: #cdd6e4; stroke-width: 1.3; rx: 8; }
      .line { stroke: #27364a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="960" height="360"/>
  <text class="title" x="40" y="46">BioBench row: edit the sender, read the receiver</text>
  <text class="subtitle" x="40" y="70">Each row is a falsifiable tissue-biology statement scored by a controlled in-silico perturbation.</text>

  <g>
    <rect class="box" x="40" y="122" width="150" height="130"/>
    <text class="label" x="67" y="153">Sender program</text>
    <text class="small" x="66" y="180">ligand family</text>
    <text class="small" x="66" y="201">or tissue module</text>
    <rect x="67" y="218" width="96" height="18" fill="#e7f7f1" stroke="#98d9c0" rx="9"/>
    <text class="badge" x="85" y="231">AREG EGF</text>
  </g>
  <line class="line" x1="200" y1="187" x2="260" y2="187"/>

  <g>
    <rect class="box" x="270" y="122" width="145" height="130"/>
    <text class="label" x="302" y="153">Edit</text>
    <text class="small" x="297" y="180">KO lowers</text>
    <text class="small" x="297" y="201">OE raises</text>
    <path d="M317 222 L342 197 L367 222" stroke="#29a37a" stroke-width="4" fill="none"/>
  </g>
  <line class="line" x1="425" y1="187" x2="485" y2="187"/>

  <g>
    <rect class="box" x="495" y="102" width="165" height="170"/>
    <text class="label" x="530" y="134">Gaia rollout</text>
    <text class="small" x="530" y="158">k = 20 neighbors</text>
    <circle cx="578" cy="204" r="24" fill="#27364a"/>
    <circle cx="535" cy="188" r="13" fill="#29a37a"/>
    <circle cx="550" cy="238" r="13" fill="#f2b84b"/>
    <circle cx="614" cy="235" r="13" fill="#ef6f6c"/>
    <circle cx="623" cy="181" r="13" fill="#2f80ed"/>
    <path d="M546 191 L565 199 M558 230 L570 215 M604 227 L588 216 M614 185 L590 198" stroke="#9aa8b8" stroke-width="1.6"/>
  </g>
  <line class="line" x1="670" y1="187" x2="730" y2="187"/>

  <g>
    <rect class="box" x="740" y="122" width="180" height="130"/>
    <text class="label" x="777" y="153">Receiver readout</text>
    <text class="small" x="776" y="180">pathway or gene set</text>
    <text class="small" x="776" y="201">vs matched null</text>
    <rect x="777" y="218" width="95" height="18" fill="#e7f0ff" stroke="#9bbff2" rx="9"/>
    <text class="badge" x="794" y="231">PASS</text>
  </g>

  <rect x="145" y="300" width="270" height="34" fill="#f3f6fa" stroke="#d6dee9" rx="8"/>
  <text class="subtitle" x="164" y="322">Ligand-receptor pathway rows: 183 public-blog rows</text>
  <rect x="445" y="300" width="310" height="34" fill="#f3f6fa" stroke="#d6dee9" rx="8"/>
  <text class="subtitle" x="464" y="322">Regional tissue-program rows: 106 public-blog rows</text>
</svg>
