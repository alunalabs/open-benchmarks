<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Gaia architecture</title>
  <desc id="desc">Diagram showing masked cell genes encoded by Tx1, neighborhood prediction by Gaia, and decoding to gene and pathway readouts.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27364a"/>
    </marker>
    <style>
      .bg { fill: #fbfcff; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .subtitle { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536174; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2a3a; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6b7a; }
      .tiny { font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .box { fill: #ffffff; stroke: #cdd6e4; stroke-width: 1.3; rx: 8; }
      .shadow { filter: drop-shadow(0 7px 16px rgba(31, 42, 58, 0.10)); }
      .line { stroke: #27364a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="960" height="360"/>
  <text class="title" x="40" y="46">Gaia architecture: encode -&gt; predict -&gt; decode</text>
  <text class="subtitle" x="40" y="70">A sparse spatial cell is embedded, repaired from its neighbors, and decoded back to interpretable readouts.</text>

  <g class="shadow">
    <rect class="box" x="40" y="112" width="180" height="150"/>
    <text class="label" x="62" y="144">Masked cell genes</text>
    <text class="small" x="62" y="169">panel genes observed</text>
    <text class="small" x="62" y="190">most genes hidden</text>
    <g transform="translate(63 210)">
      <rect x="0" y="0" width="16" height="36" fill="#2f80ed" rx="3"/>
      <rect x="22" y="10" width="16" height="26" fill="#d7dee9" rx="3"/>
      <rect x="44" y="5" width="16" height="31" fill="#ef6f6c" rx="3"/>
      <rect x="66" y="18" width="16" height="18" fill="#d7dee9" rx="3"/>
      <rect x="88" y="2" width="16" height="34" fill="#29a37a" rx="3"/>
    </g>
  </g>

  <line class="line" x1="230" y1="188" x2="300" y2="188"/>

  <g class="shadow">
    <rect class="box" x="310" y="112" width="150" height="150"/>
    <text class="label" x="347" y="144">Tx1 encoder</text>
    <circle cx="385" cy="194" r="42" fill="#e7f0ff" stroke="#7daff4" stroke-width="2"/>
    <text class="small" x="347" y="199">cell embedding</text>
    <text class="small" x="338" y="229">shared backbone</text>
  </g>

  <line class="line" x1="470" y1="188" x2="540" y2="188"/>

  <g class="shadow">
    <rect class="box" x="550" y="92" width="190" height="190"/>
    <text class="label" x="586" y="124">Gaia predictor</text>
    <text class="small" x="590" y="148">local neighborhood</text>
    <circle cx="645" cy="192" r="25" fill="#27364a"/>
    <text class="tiny" x="634" y="196">cell</text>
    <circle cx="596" cy="173" r="15" fill="#29a37a"/>
    <circle cx="616" cy="232" r="15" fill="#f2b84b"/>
    <circle cx="686" cy="231" r="15" fill="#ef6f6c"/>
    <circle cx="698" cy="164" r="15" fill="#2f80ed"/>
    <path d="M610 177 L633 187 M625 222 L636 204 M676 221 L657 205 M687 169 L657 184" stroke="#9aa8b8" stroke-width="1.7"/>
    <text class="small" x="594" y="265">predict full latent state</text>
  </g>

  <line class="line" x1="750" y1="188" x2="820" y2="188"/>

  <g class="shadow">
    <rect class="box" x="830" y="112" width="90" height="150"/>
    <text class="label" x="849" y="144">Decode</text>
    <text class="small" x="848" y="171">genes</text>
    <text class="small" x="848" y="193">pathways</text>
    <text class="small" x="848" y="215">clinical</text>
    <text class="small" x="848" y="237">axes</text>
  </g>

  <rect x="312" y="304" width="340" height="34" fill="#f3f6fa" stroke="#d6dee9" rx="8"/>
  <text class="subtitle" x="332" y="326">Training objective: latent cosine + smooth-L1 against the full-gene target embedding</text>
</svg>
